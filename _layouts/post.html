---
layout: default
---

<article class="container animate">
  <header style="margin-bottom: 3rem; text-align: center;">
    <h1 class="hero-title" style="font-size: 3rem;">{{ page.title }}</h1>
    <p style="color: var(--text-muted);">Published on {{ page.date | date: "%B %d, %Y" }}</p>
    
    {% if page.author %}
      {% assign author = site.authors[page.author] %}
      <div style="display: flex; align-items: center; justify-content: center; gap: 1rem; margin-top: 2rem;">
        <img src="{{ author.avatar }}" alt="{{ author.name }}" style="width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent-color);">
        <div style="text-align: left;">
          <p style="font-weight: 700; color: var(--accent-color);">{{ author.display_name }}</p>
          <p style="font-size: 0.8rem; color: var(--text-muted);">{{ author.bio }}</p>
        </div>
      </div>
    {% endif %}
  </header>

  <div class="card content-area">


    {{ content }}
  </div>

  <div style="margin-top: 4rem; text-align: center;">
    <a href="/blog" class="tech-badge">← Back to Recon Logs</a>
  </div>
</article>

<style>
.content-area {
  line-height: 1.8;
  font-size: 1.1rem;
}
.content-area h2, .content-area h3 {
  color: var(--accent-color);
  margin-top: 2.5rem;
  margin-bottom: 1rem;
}
.content-area p {
  margin-bottom: 1.5rem;
}
.content-area ul, .content-area ol {
  margin-bottom: 1.5rem;
  margin-left: 2rem;
}
.content-area code {
  background: #000;
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--accent-color);
  font-family: var(--font-mono);
}
</style>
